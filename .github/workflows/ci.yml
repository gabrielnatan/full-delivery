name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  planner:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gerenciador-projetos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Testes
        run: npm test
      - name: Lint de docs (frontmatter + referências cruzadas)
        run: npm run lint:docs
      - name: Lint do exemplo diadema-entregas
        run: KICKOFF_DOCS=../examples/diadema-entregas/docs npm run lint:docs
